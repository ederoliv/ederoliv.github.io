<!DOCTYPE html>
<html lang="pt-bt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criptografia</title>
  <link rel="stylesheet" href="./styles/style.css">
  <link rel="stylesheet" href="./styles/alura-challenge.css">
</head>
<body>
    <header class="cabecalho">
        <nav class="cabecalho__menu">
            <a class="cabecalho__menu__link" href="index.html">Início</a>
            <a class="cabecalho__menu__link" href="about.html">Sobre mim</a>
        </nav>
    </header>

<main class="apresentacao__challenge">
    <section class="apresentacao__conteudo__challenge">
  <h1 class="apresentacao__conteudo__titulo">Criptografia de Texto</h1>
  
  <label for="text">Texto:</label>
  <textarea class="apresentacao__conteudo__itens" id="text" rows="4" cols="50"></textarea><br><br>
  
  <label for="mode">Modo:</label>
  <select class="apresentacao__conteudo__itens" id="mode">
    <option value="encrypt">Criptografar</option>
    <option value="decrypt">Descriptografar</option>
  </select><br><br>
  
  <button class="apresentacao__conteudo__itens" onclick="convertText()">Converter</button><br><br>
  
  <label for="result">Resultado:</label>
  <textarea class="apresentacao__conteudo__itens" id="result" rows="4" cols="50"></textarea><br><br>
  
  <button class="apresentacao__conteudo__itens" onclick="copyToClipboard()">Copiar para Área de Transferência</button>


  <script>
    function convertText() {
      var text = document.getElementById("text").value.toLowerCase();
      var mode = document.getElementById("mode").value;
      var result = "";
      
      if (mode === "encrypt") {
        result = encrypt(text);
      } else if (mode === "decrypt") {
        result = decrypt(text);
      }
      
      document.getElementById("result").value = result;
    }

    function encrypt(text) {
      return text.replace(/e/g, "enter")
                 .replace(/i/g, "imes")
                 .replace(/a/g, "ai")
                 .replace(/o/g, "ober")
                 .replace(/u/g, "ufat");
    }

    function decrypt(text) {
      return text.replaceAll("enter", "e")
                 .replace(/imes/g, "i")
                 .replace(/ai/g, "a")
                 .replace(/ober/g, "o")
                 .replace(/ufat/g, "u");
    }

    function copyToClipboard() {
      var resultTextarea = document.getElementById("result");
      resultTextarea.select();
      document.execCommand("copy");
      alert("Texto copiado para a área de transferência!");
    }
  </script>
</section>
</main>
</body>
</html>
